<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Lookup</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    
    <script src="https://cdn.jsdelivr.net/npm/mathjs@11/lib/browser/math.js" defer></script>
    <script src="calculations/fetchdata.js" defer></script>
    <script src="calculations/opr.js" defer></script>
    <script src="calculations/calc.js" defer></script>

    <style>
        /* --- ADDED LOADING & REFRESH STYLES --- */
        .lookup-container { position: relative; }

        .loader-container {
            display: none; /* Hidden by default */
            position: absolute;
            top: 150px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 10px;
        }

        .spinner {
            border: 6px solid #f3f3f3;
            border-top: 6px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .refresh-btn {
            padding: 8px 15px;
            background-color: #2e7f50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
            transition: background 0.3s;
        }

        .refresh-btn:hover { background-color: #27ae60; }
        
        #resultsContainer { transition: opacity 0.3s ease; }
        /* ------------------------------------ */
    </style>
</head>
<body>

    <h1>Team Lookup</h1>

    <div class="lookup-container">
        <div id="loader" class="loader-container">
            <div class="spinner"></div>
            <p>Updating Data...</p>
        </div>

        <div class="search-controls" style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
            <select value="2026mimus" id="cmpSelect">
                <option value="2026mimus">Muskegon</option>
                <option value="2026miken">Kentwood</option>
            </select>

            <div class="search-box" style="display: flex; gap: 5px;">
                <input type="number" id="teamInput" placeholder="Enter Team Number" onkeypress="handleKeyPress(event)">
                <button onclick="lookupTeam()">Search</button>
            </div>

            <button class="refresh-btn" onclick="refreshData()">Refresh</button>
        </div>

        <div id="resultsContainer">
            <p>Enter a team number above to see their full profile.</p>
        </div>
    </div>

<script>
        // --- REFRESH LOGIC ---
        async function refreshData() {
            const loader = document.getElementById('loader');
            const container = document.getElementById('resultsContainer');
            
            loader.style.display = 'block';
            container.style.opacity = '0.3';

            try {
                // Check if a global load function exists from your scripts
                if (window.loadDataFromServer) {
                    await window.loadDataFromServer();
                } else {
                    // Artificial delay to show the animation if loading is instant
                    await new Promise(resolve => setTimeout(resolve, 800));
                }
                
                // If a team was already searched, update their view
                if (document.getElementById('teamInput').value) {
                    lookupTeam();
                }
            } catch (e) {
                console.error("Data refresh failed", e);
            } finally {
                loader.style.display = 'none';
                container.style.opacity = '1';
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                lookupTeam();
            }
        }

        function lookupTeam() {
            const teamNum = document.getElementById('teamInput').value;
            const container = document.getElementById('resultsContainer');
            
            container.innerHTML = ''; 

            if (!teamNum) {
                container.innerHTML = '<p class="error-msg">Please enter a team number.</p>';
                return;
            }

            const matchData = (typeof teamData !== 'undefined' && teamData[teamNum]) ? teamData[teamNum] : null;
            
            let pitData = null;
            if (typeof allPitData !== 'undefined' && Array.isArray(allPitData)) {
                pitData = allPitData.find(team => team["Team Number"] == teamNum);
            }

            if (!matchData && !pitData) {
                container.innerHTML = `<p class="error-msg">Team ${teamNum} not found in Match or Pit scouting databases.</p>`;
                return;
            }

            const teamName = pitData && pitData["Team Name"] ? ` - ${pitData["Team Name"]}` : "";
            let outputHTML = `<h2>Team ${teamNum}${teamName} Profile</h2>`;
            
            outputHTML += `<div class="data-section"><h3>Pit Scouting Data</h3>`;
            if (pitData) {
                const displayPitData = { ...pitData };
                delete displayPitData["Timestamp"];
                delete displayPitData["Team Number"];
                delete displayPitData["Team Name"];
                outputHTML += buildStatsHTML(displayPitData);
            } else {
                outputHTML += `<p><em>N/A - No pit scouting data recorded.</em></p>`;
            }
            outputHTML += `</div>`;

            outputHTML += `<div class="data-section"><h3>Match Scouting Data</h3>`;
            if (matchData) {
                outputHTML += buildStatsHTML(matchData);
            } else {
                outputHTML += `<p><em>N/A - No match scouting data recorded.</em></p>`;
            }
            outputHTML += `</div>`;
            
            container.innerHTML = outputHTML;
        }

        function buildStatsHTML(obj) {
            let html = '<ul class="stats-list">';
            for (const key in obj) {
                if (typeof obj[key] === 'object' && obj[key] !== null && !Array.isArray(obj[key])) {
                    html += `<li><strong>${formatKey(key)}:</strong> ${buildStatsHTML(obj[key])}</li>`;
                } 
                else if (Array.isArray(obj[key])) {
                    html += `<li><strong>${formatKey(key)}:</strong> ${obj[key].join(', ')}</li>`;
                }
                else {
                    let val = obj[key];
                    if (typeof val === 'number') {
                        if (key.toLowerCase().includes('rate') || key.toLowerCase().includes('frequency')) {
                            val = (val * 100).toFixed(0) + '%';
                        } else if (!Number.isInteger(val)) {
                            val = val.toFixed(2);
                        }
                    }
                    if (val === "" || val === null || (key === "Column 1" && val === "")) {
                        val = "<em>N/A</em>";
                    }
                    html += `<li><strong>${formatKey(key)}:</strong> ${val}</li>`;
                }
            }
            html += '</ul>';
            return html;
        }

        function formatKey(key) {
            let result = key.trim().replace(/([A-Z])/g, " $1");
            return result.charAt(0).toUpperCase() + result.slice(1).trim();
        }

        // Run refresh once on startup to ensure latest data is pulled
        window.onload = refreshData;
    </script>
</body>
</html>
