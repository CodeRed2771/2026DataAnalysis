<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scouting Pick List</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/mathjs@11/lib/browser/math.js" defer></script>
    <script src="calculations/fetchdata.js" defer></script>
    <script src="calculations/opr.js" defer></script>
    <script src="calculations/calc.js" defer></script>

    <style>
        /* Side menu styling */
        .wrapper { display: flex; gap: 20px; }
        .main-content { flex-grow: 1; position: relative; } /* Relative for loader positioning */
        #suitabilityMenu {
            display: none;
            width: 250px;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            height: fit-content;
        }
        .slider-group { margin-bottom: 15px; }
        .slider-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .slider-group input { width: 100%; }

        /* --- NEW LOADING & REFRESH STYLES --- */
        .loader-container {
            display: none; /* Hidden by default */
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
        }

        .spinner {
            border: 8px solid #f3f3f3;
            border-top: 8px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .refresh-btn {
            padding: 8px 15px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .refresh-btn:hover { background-color: #27ae60; }
        /* ------------------------------------ */
    </style>
</head>
<body>

    <h1>Scouting Pick List</h1>
    <div class="controls">
        <select id="cmpSelect">
            <option value="2026mimus">Muskegon</option>
            <option value="2026miken">Kentwood</option>
        </select>        
        
        <label for="statSelect">Sort By: </label>
        <select id="statSelect" onchange="renderTable()">
            <option value="suitability">Suitability Score</option>
            <option value="avgTeleopCycles">Tele Cycles</option>
            <option value="avgTeleopCycleTime">Tele Cycle Time</option>
            <option value="teleFuelPerCycle">Tele Fuel/Cycle</option>
            <option value="avgFireRate">Fire Rate</option>
            <option value="teleSuccessRate">Tele Climb Success Rate</option>
            <option value="avgDefenseScore">Def Score</option>
        </select>

        <button class="refresh-btn" onclick="refreshData()">Refresh Data</button>
    </div>
    
    <div class="wrapper">
        <div class="main-content">
            <div id="loader" class="loader-container">
                <div class="spinner"></div>
                <p>Fetching Data...</p>
            </div>

            <div class="table-container">
                <table id="picklistTable">
                    <thead>
                        <tr>
                            <th>Team</th>
                            <th id="dynamicHeader">Statistic</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="suitabilityMenu">
            <h3>Adjust Weights</h3>
            <div class="slider-group">
                <label>Teleop OPR: <span id="wTeleOPRVal">0.5</span></label>
                <input type="range" id="wTeleOPR" min="0" max="1" step="0.1" value="0.5" oninput="updateSliders()">
            </div>
            <div class="slider-group">
                <label>Auto OPR: <span id="wAutoOPRVal">0.5</span></label>
                <input type="range" id="wAutoOPR" min="0" max="1" step="0.1" value="0.5" oninput="updateSliders()">
            </div>
            <div class="slider-group">
                <label>Avg Defense: <span id="wDefenseVal">0.5</span></label>
                <input type="range" id="wDefense" min="0" max="1" step="0.1" value="0.5" oninput="updateSliders()">
            </div>
            <div class="slider-group">
                <label>Avg Cycle Time: <span id="wCycleVal">0.5</span></label>
                <input type="range" id="wCycle" min="0" max="1" step="0.1" value="0.5" oninput="updateSliders()">
                <small style="color: #666;">(Subtracts from score)</small>
            </div>
        </div>
    </div>
    
    <script>
        // --- NEW LOGIC FOR LOADING AND REFRESHING ---
        
        async function refreshData() {
            const loader = document.getElementById('loader');
            const tbody = document.getElementById('tableBody');
            
            // Show loader, hide existing table data
            loader.style.display = 'block';
            tbody.style.opacity = '0.3'; 

            try {
                // If your fetchdata.js has a specific init function, call it here.
                // Otherwise, we trigger a small delay to simulate the network request
                // and then call renderTable.
                if (window.loadDataFromServer) { 
                    await window.loadDataFromServer(); 
                } else {
                    await new Promise(resolve => setTimeout(resolve, 800)); // Simulating fetch
                }
                
                renderTable();
            } catch (error) {
                console.error("Failed to fetch data:", error);
                alert("Error updating data.");
            } finally {
                loader.style.display = 'none';
                tbody.style.opacity = '1';
            }
        }

        // Modified renderTable to include data safety checks
        function renderTable() {
            if (typeof teamData === 'undefined' || Object.keys(teamData).length === 0) {
                return;
            }

            const selectedStat = document.getElementById('statSelect').value;
            const headerText = document.querySelector(`#statSelect option[value="${selectedStat}"]`).text;
            document.getElementById('dynamicHeader').innerText = headerText;

            const sideMenu = document.getElementById('suitabilityMenu');
            sideMenu.style.display = (selectedStat === 'suitability') ? 'block' : 'none';

            const wTele = parseFloat(document.getElementById('wTeleOPR').value);
            const wAuto = parseFloat(document.getElementById('wAutoOPR').value);
            const wDef = parseFloat(document.getElementById('wDefense').value);
            const wCyc = parseFloat(document.getElementById('wCycle').value);

            let tableDataArray = Object.keys(teamData).map(teamNum => {
                const data = teamData[teamNum];
                const teleOPR = data.teleopOPR || 0; 
                const autoOPR = data.autoOPR || 0;
                const defScore = data.avgDefenseScore || 0;
                const cycTime = data.avgTeleopCycleTime || 0;

                const suitabilityScore = (teleOPR * wTele) + (autoOPR * wAuto) + (defScore * wDef) - (cycTime * wCyc);

                return {
                    team: parseInt(teamNum),
                    ...data,
                    teleFuelPerCycle: data.fuelPerCycle ? data.fuelPerCycle.teleFuelPerCycle : 0,
                    teleSuccessRate: data.climbSuccessRates ? data.climbSuccessRates.teleSuccessRate : 0,
                    suitability: suitabilityScore
                };
            });

            if (selectedStat === 'avgTeleopCycleTime') {
                tableDataArray.sort((a, b) => a[selectedStat] - b[selectedStat]);
            } else {
                tableDataArray.sort((a, b) => b[selectedStat] - a[selectedStat]);
            }

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ''; 

            tableDataArray.forEach(row => {
                const tr = document.createElement('tr');
                tr.onclick = () => openModal(row.team);
                
                let val = row[selectedStat] || 0;
                let displayVal;
                
                if (selectedStat.includes('Rate') || selectedStat.includes('Frequency')) {
                    displayVal = (val * 100).toFixed(0) + '%';
                } else if (selectedStat === 'suitability') {
                    displayVal = val.toFixed(2) + ' pts';
                } else {
                    displayVal = val.toFixed(2);
                }

                tr.innerHTML = `<td><strong>${row.team}</strong></td><td>${displayVal}</td>`;
                tbody.appendChild(tr);
            });
        }

        // Initialize on load
        window.onload = () => {
            refreshData(); 
        };

        function updateSliders() {
            document.getElementById('wTeleOPRVal').innerText = document.getElementById('wTeleOPR').value;
            document.getElementById('wAutoOPRVal').innerText = document.getElementById('wAutoOPR').value;
            document.getElementById('wDefenseVal').innerText = document.getElementById('wDefense').value;
            document.getElementById('wCycleVal').innerText = document.getElementById('wCycle').value;
            renderTable();
        }

        // (Include your openModal and closeModal functions here)
    </script>
</body>
</html>
